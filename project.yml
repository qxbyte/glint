name: Glint
options:
  bundleIdPrefix: com.qxbyte
  deploymentTarget:
    macOS: "26.0"
packages:
  GlintKit:
    path: GlintKit
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
targets:
  Glint:
    type: application
    platform: macOS
    sources: [Glint]
    dependencies:
      - package: GlintKit
      - package: KeyboardShortcuts
    info:
      path: Glint/Info.plist
      properties:
        CFBundleDisplayName: Glint
        CFBundleIconFile: Glint      # Glint/Resources/Glint.icns
        LSUIElement: true            # 菜单栏常驻，无 Dock 图标
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qxbyte.glint
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"      # ad-hoc，自用；TCC 反复弹窗时改稳定证书
schemes:
  Glint:
    build:
      targets:
        Glint: all
    run:
      config: Debug
